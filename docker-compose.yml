services:
  feed:
    build: .
    ports:
      - '2987:2987'
    # config + secrets come from .env at runtime (never baked into the image — .env is
    # gitignored + dockerignored). Copy .env.example to .env and fill it in.
    env_file: .env
    volumes:
      # bind-mounted dirs must be writable by uid 1000 (the container's node user)
      - ./data:/app/data
      - ./media:/app/media
    restart: unless-stopped
